spring:
  application:
    name: ubumonitorweb
  profiles:
    active: dev
  web:
    locale: en
    error.include-stacktrace: never
  messages:
    fallback-to-system-locale: false


logging:
  level:
    es.ubu.lsi.ubumonitorweb: debug

moodle:
  profiles:

    default:
      host-header: Moodle-Host
      send-headers: [ Accept-Language ]
      headers:
        Content-Type: application/x-www-form-urlencoded

    auth:
      endpoint: /login/token.php
      params:
        service: moodle_mobile_app

    rest:
      endpoint: /webservice/rest/server.php
      params:
        moodlewsrestformat: json
        wsfunction: snakeCaseStrategy
        wstoken:
