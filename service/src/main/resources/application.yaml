spring:
  application:
    name: ubumonitorweb
  profiles:
    active: dev
  web:
    locale: en
    error.include-stacktrace: never
  messages:
    fallback-to-system-locale: false

logging:
  level:
    es.ubu.lsi.ubumonitorweb: debug

moodle:
  services:
    auth:
      endpoint: /login/token.php
      host-header: Moodle-Host
      headers: [ Accept-Language ]
      params:
        service: moodle_mobile_app

    rest:
      endpoint: /webservice/rest/server.php
      host-header: Moodle-Host
      headers: [ Accept-Language ]
      params:
        moodlewsformat: json
        wsfunction: snakeCaseResolver
        wstoken:
